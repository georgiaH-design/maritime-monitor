# .github/workflows/update-msi.yml
#
# Fetches NGA Maritime Safety Information broadcast warnings every 30 minutes
# and saves them to data/msi.json so the map page can read them without CORS issues.
# Also scrapes MARAD MSCI Alerts and Advisories into data/marad.json.

name: Update Maritime Safety Data

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:           # allows manual run from the Actions tab

permissions:
  contents: write

jobs:
  update-msi:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch NGA MSI broadcast warnings
        run: |
          mkdir -p data

          echo "Fetching NGA MSI data..."
          curl -s --max-time 45 \
            -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36" \
            -H "Accept: application/json, */*" \
            -H "Referer: https://msi.nga.mil/" \
            "https://msi.nga.mil/api/publications/broadcast-warn?output=json" \
            -o data/msi_new.json || true

          BYTES=$(wc -c < data/msi_new.json 2>/dev/null || echo 0)
          echo "Received ${BYTES} bytes"

          if python3 -c "
          import json, sys
          d = json.load(open('data/msi_new.json'))
          items = d.get('broadcast-warn', [])
          print(f'Items: {len(items)}')
          assert len(items) > 0, 'Empty result'
          " 2>/dev/null; then
            echo "Valid MSI data — moving to data/msi.json"
            mv data/msi_new.json data/msi.json
          else
            echo "WARNING: NGA MSI returned invalid or empty data. Keeping existing data/msi.json."
            head -c 500 data/msi_new.json || true
            rm -f data/msi_new.json
            [ -f data/msi.json ] || echo '{"broadcast-warn":[]}' > data/msi.json
          fi

      - name: Fetch MARAD MSCI Alerts and Advisories
        run: |
          python3 - << 'PYEOF'
          import json, re, urllib.request
          from datetime import datetime, timezone

          def fetch(url):
              req = urllib.request.Request(url, headers={
                  'User-Agent': 'Mozilla/5.0 (compatible; maritime-monitor/1.0)'
              })
              with urllib.request.urlopen(req, timeout=30) as r:
                  return r.read().decode('utf-8')

          def parse_active(html):
              items = []
              cancelled_pos = html.lower().find('cancelled')
              active_html = html[:cancelled_pos] if cancelled_pos > 0 else html
              rows = re.findall(r'<tr[^>]*>(.*?)</tr>', active_html, re.DOTALL | re.IGNORECASE)
              for row in rows:
                  cells = re.findall(r'<t[dh][^>]*>(.*?)</t[dh]>', row, re.DOTALL | re.IGNORECASE)
                  if len(cells) < 4:
                      continue
                  link = re.search(r'href="(/[^"]+)"[^>]*>([^<]+)', cells[0])
                  if not link:
                      continue
                  title = link.group(2).strip()
                  status = re.sub(r'<[^>]+>', '', cells[1]).strip()
                  effective = re.sub(r'<[^>]+>', '', cells[2]).strip()
                  expires = re.sub(r'<[^>]+>', '', cells[3]).strip()
                  if status.lower() != 'active':
                      continue
                  items.append({
                      'title': title,
                      'url': 'https://www.maritime.dot.gov' + link.group(1),
                      'status': status,
                      'effective': effective,
                      'expires': expires
                  })
              return items

          alerts, advisories = [], []
          try:
              alerts = parse_active(fetch('https://www.maritime.dot.gov/msci-alerts'))
              print(f'Alerts: {len(alerts)}')
          except Exception as e:
              print(f'Alerts fetch error: {e}')
          try:
              advisories = parse_active(fetch('https://www.maritime.dot.gov/msci-advisories'))
              print(f'Advisories: {len(advisories)}')
          except Exception as e:
              print(f'Advisories fetch error: {e}')

          data = {
              'fetched': datetime.now(timezone.utc).isoformat(),
              'alerts': alerts,
              'advisories': advisories
          }
          with open('data/marad.json', 'w') as f:
              json.dump(data, f, indent=2)
          print(f'MARAD: {len(alerts)} alerts, {len(advisories)} advisories -> data/marad.json')
          PYEOF

      - name: Commit and push if data changed
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add data/msi.json data/marad.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update maritime data — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
